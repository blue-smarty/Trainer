{% extends "base.html" %}

{% block title %}Train Model - Trainer UI{% endblock %}

{% block content %}
<section class="card">
    <h2>Train Model</h2>
    <p>Run the existing training workflow with the selected <code>data.yaml</code>.</p>
    {% if message %}
    <div class="message {{ message_type }}">{{ message }}</div>
    {% endif %}
    <form method="post" action="/train">
        <label>
            Path to data.yaml
            <select name="data_yaml" required>
                {% for option in data_yaml_options %}
                <option value="{{ option }}" {% if option == form_data.data_yaml %}selected{% endif %}>{{ option }}</option>
                {% endfor %}
            </select>
        </label>
        <div class="grid">
            <label>
                Model
                <input type="text" name="model_name" value="{{ form_data.model_name }}" required>
            </label>
            <label>
                Epochs
                <input type="number" name="epochs" min="1" value="{{ form_data.epochs }}" required>
            </label>
            <label>
                Image size
                <input type="number" name="imgsz" min="32" value="{{ form_data.imgsz }}" required>
            </label>
            <label>
                Batch size
                <input type="number" name="batch" min="1" value="{{ form_data.batch }}" required>
            </label>
            <label>
                Device (optional)
                <input type="text" name="device" value="{{ form_data.device }}">
            </label>
            <label>
                Project directory
                <input type="text" name="project" value="{{ form_data.project }}" required>
            </label>
            <label>
                Run name
                <input type="text" name="run_name" value="{{ form_data.run_name }}" required>
            </label>
            <label>
                Config yaml (optional)
                <input type="text" name="cfg" value="{{ form_data.cfg }}">
            </label>
        </div>
        <label class="checkbox">
            <input type="checkbox" name="resume" value="true" {% if form_data.resume %}checked{% endif %}>
            Resume previous run
        </label>
        <button type="submit">Run training</button>
    </form>
</section>
{% endblock %}
