{% extends "base.html" %}

{% block title %}Setup Dataset - Trainer UI{% endblock %}

{% block content %}
<section class="card">
    <h2>Setup Dataset</h2>
    <p>Create the standard YOLO dataset structure and generate a <code>data.yaml</code> file.</p>
    {% if message %}
    <div class="message {{ message_type }}">{{ message }}</div>
    {% endif %}
    <form method="post" action="/setup">
        <label>
            Dataset root
            <input type="text" name="dataset_root" value="{{ form_data.dataset_root }}" required>
        </label>
        <label>
            Classes (comma-separated)
            <input type="text" name="classes" value="{{ form_data.classes }}" required>
        </label>
        <button type="submit">Run dataset setup</button>
    </form>
</section>
{% endblock %}
